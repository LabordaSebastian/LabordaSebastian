name: Generate Snake Animation

on:
  schedule: # Ejecuta el script cada 24 horas automáticamente
    - cron: "0 0 * * *"
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña "Actions"
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          # Tu nombre de usuario en GitHub
          github_user_name: ${{ github.repository_owner }}
          # Genera la serpiente en versión clara y oscura
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
